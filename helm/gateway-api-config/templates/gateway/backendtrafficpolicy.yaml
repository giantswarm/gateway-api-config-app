{{- range $i, $gateway := .Values.gateways }}
{{- if $gateway.enabled }}
{{- $classErrorPages := dict }}
{{- range $_, $class := $.Values.gatewayClasses }}
{{- if eq $class.name $gateway.className }}
{{- $classErrorPages = $class.errorPages | default dict }}
{{- end }}
{{- end }}
{{- $errorPages := include "errorPages.effective" (dict "class" $classErrorPages "gateway" $gateway.errorPages) | fromYaml }}
{{- /* Pass-through BackendTrafficPolicy spec fields (circuitBreaker, rateLimit, retry, ...). */}}
{{- $btp := $gateway.backendTrafficPolicy | default dict }}
{{- $spec := omit $btp "enabled" }}
{{- /* Render a single policy when error pages are enabled or extra spec fields are set,
       unless explicitly disabled via backendTrafficPolicy.enabled: false. */}}
{{- $shouldRender := or $errorPages.enabled (gt (len $spec) 0) }}
{{- if and (hasKey $btp "enabled") (not $btp.enabled) }}
{{- $shouldRender = false }}
{{- end }}
{{- if $shouldRender }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: gateway-{{ $gateway.name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "labels.common" $ | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gateway.name }}
  {{- if $gateway.circuitBreakers.enabled }}
  circuitBreaker:
    maxConnections: {{ $gateway.circuitBreakers.maxConnections }}
    maxPendingRequests: {{ $gateway.circuitBreakers.maxPendingRequests }}
    maxParallelRequests: {{ $gateway.circuitBreakers.maxParallelRequests }}
    maxParallelRetries: {{ $gateway.circuitBreakers.maxParallelRetries }}
  {{- end }}
  {{- with $spec }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
  {{- if $errorPages.enabled }}
  responseOverride:
    - match:
        statusCodes:
          {{- range $errorPages.statusCodes }}
          {{- if eq .type "Range" }}
          - type: Range
            range:
              start: {{ .range.start }}
              end: {{ .range.end }}
          {{- else }}
          - type: Value
            value: {{ .value }}
          {{- end }}
          {{- end }}
      response:
        contentType: {{ $errorPages.contentType | quote }}
        body:
          type: ValueRef
          valueRef:
            group: ""
            kind: ConfigMap
            {{- if $errorPages.existingConfigMapName }}
            name: {{ $errorPages.existingConfigMapName }}
            {{- else }}
            name: gateway-{{ $gateway.name }}-error-pages
            {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
