baseDomain: example.com

kyvernoPolicies:
  observability:
    resourceName: "{{ request.object.metadata.name }}"
    resourceNamespace: "{{ request.object.metadata.namespace }}"
  preconditions:
    key: "{{ request.object.spec.gatewayClassName }}"

# Global error pages configuration applied to all gateways.
# Per-gateway errorPages settings override these defaults.
errorPages:
  enabled: false
  statusCodes:
    - type: Value
      value: 500
    - type: Value
      value: 502
    - type: Value
      value: 503
    - type: Value
      value: 504
  contentType: "text/html"
  body: ""
  existingConfigMapName: ""

gatewayClasses:
  default:
    enabled: true
    name: giantswarm-default
    envoyProxy:
      enabled: true
      envoyDeployment: {}
      envoyService: {}
      envoyHpa: {}
      envoyPDB: {}
      envoyServiceAccount: {}

gateways:
  default:
    enabled: true
    name: giantswarm-default
    dnsName: gateway
    className: giantswarm-default
    overrideBaseDomain: ""
    provider:
      aws:
        useNetworkLoadBalancer: true
    service:
      annotations: {}
      labels: {}
      externalTrafficPolicy: ""
      loadBalancerClass: ""
    tlsIssuer:
      enabled: true
      name: letsencrypt-giantswarm-gateway
      email: accounts@giantswarm.io
      gateway: giantswarm-default
    listeners:
      http:
        name: http
        protocol: HTTP
        port: 80
        httpsRedirectEnabled: false
        allowedRoutes:
          namespaces:
            from: All
      https:
        name: https
        protocol: HTTPS
        hostname: '*.{{ $.Values.baseDomain }}'
        subdomains: []
        certificate:
          enabled: true
          wildcard: false
          issuer:
            kind: ""
            name: ""
        dnsEndpoints:
          enabled: true
          annotations:
            giantswarm.io/external-dns: managed
        port: 443
        allowedRoutes:
          namespaces:
            from: All
        tls:
          mode: Terminate
          certificateRefs: []
    # Per-gateway error pages override global errorPages settings.
    # Omit fields to inherit from global config.
    errorPages: {}
    envoyProxy:
      enabled: true
      envoyDeployment: {}
      envoyService: {}
      envoyHpa: {}
      envoyPDB: {}
      envoyServiceAccount: {}
