baseDomain: example.com

kyvernoPolicies:
  observability:
    resourceName: "{{ request.object.metadata.name }}"
    resourceNamespace: "{{ request.object.metadata.namespace }}"
  preconditions:
    key: "{{ request.object.spec.gatewayClassName }}"

gatewayClasses:
  default:
    enabled: true
    name: giantswarm-default
    # Per-gatewayclass error pages configuration applied to all gateways in this class.
    # Per-gateway errorPages settings override these defaults.
    errorPages:
      enabled: false
      statusCodes:
        - type: Range
          range:
            start: 400
            end: 404
        - type: Value
          value: 500
        - type: Value
          value: 502
        - type: Value
          value: 503
        - type: Value
          value: 504
      contentType: "text/html"
      body: ""
      existingConfigMapName: ""
    envoyProxy:
      enabled: true
      envoyDeployment: {}
      envoyService: {}
      envoyHpa: {}
      envoyPDB: {}
      envoyServiceAccount: {}

gateways:
  default:
    enabled: true
    name: giantswarm-default
    dnsName: gateway
    className: giantswarm-default
    overrideBaseDomain: ""
    provider:
      aws:
        useNetworkLoadBalancer: true
    service:
      annotations: {}
      labels: {}
      externalTrafficPolicy: ""
      loadBalancerClass: ""
    tlsIssuer:
      enabled: true
      name: letsencrypt-giantswarm-gateway
      email: accounts@giantswarm.io
      gateway: giantswarm-default
    listeners:
      http:
        name: http
        protocol: HTTP
        port: 80
        httpsRedirectEnabled: false
        allowedRoutes:
          namespaces:
            from: All
      https:
        name: https
        protocol: HTTPS
        hostname: '*.{{ $.Values.baseDomain }}'
        subdomains: []
        certificate:
          enabled: true
          wildcard: false
          issuer:
            kind: ""
            name: ""
        dnsEndpoints:
          enabled: true
          annotations:
            giantswarm.io/external-dns: managed
        port: 443
        allowedRoutes:
          namespaces:
            from: All
        tls:
          mode: Terminate
          certificateRefs: []
    # Per-gateway error pages override gatewayClass errorPages settings.
    # Omit fields to inherit from gatewayClass config.
    errorPages: {}
    # Path settings for ClientTrafficPolicy (optional)
    # Uncomment to configure path handling behavior:
    # path:
    #   # How to handle escaped slashes in URL paths:
    #   # - KeepUnchanged: preserve %2F as-is
    #   # - DecodeAndMerge: decode %2F to / before route matching (default)
    #   # - UnescapeAndRedirect: decode and redirect
    #   escapedSlashesAction: DecodeAndMerge
    envoyProxy:
      enabled: true
      envoyDeployment: {}
      envoyService: {}
      envoyHpa: {}
      envoyPDB: {}
      envoyServiceAccount: {}
