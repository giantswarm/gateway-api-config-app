baseDomain: example.com

kyvernoPolicies:
  observability:
    resourceName: "{{ request.object.metadata.name }}"
    resourceNamespace: "{{ request.object.metadata.namespace }}"
  preconditions:
    key: "{{ request.object.spec.gatewayClassName }}"

gatewayClasses:
  default:
    enabled: true
    name: giantswarm-default
    # Per-gatewayclass error pages configuration applied to all gateways in this class.
    # Per-gateway errorPages settings override these defaults.
    errorPages:
      enabled: false
      statusCodes:
        - type: Range
          range:
            start: 400
            end: 404
        - type: Value
          value: 500
        - type: Value
          value: 502
        - type: Value
          value: 503
        - type: Value
          value: 504
      contentType: "text/html"
      body: ""
      existingConfigMapName: ""
    envoyProxy:
      enabled: true
      # Controls how this GatewayClass-level EnvoyProxy merges with EnvoyGateway defaults
      # (hierarchy: EnvoyGateway defaults < GatewayClass < Gateway). Leave unset to fully
      # replace EnvoyGateway defaults; set to StrategicMerge or JSONMerge to extend them.
      mergeType: ""
      envoyDeployment: {}
      envoyService: {}
      envoyHpa: {}
      envoyPDB: {}
      envoyServiceAccount: {}

gateways:
  default:
    enabled: true
    name: giantswarm-default
    dnsName: gateway
    className: giantswarm-default
    overrideBaseDomain: ""
    provider:
      aws:
        useNetworkLoadBalancer: true
    service:
      annotations: {}
      labels: {}
      externalTrafficPolicy: ""
      loadBalancerClass: ""
    tlsIssuer:
      enabled: true
      name: letsencrypt-giantswarm-gateway
      email: accounts@giantswarm.io
      gateway: giantswarm-default
    allowedListeners:
      enabled: false
      namespaces:
        from: All
        selector: {}
    listeners:
      http:
        name: http
        protocol: HTTP
        port: 80
        httpsRedirectEnabled: false
        allowedRoutes:
          namespaces:
            from: All
      https:
        name: https
        protocol: HTTPS
        hostname: '*.{{ $.Values.baseDomain }}'
        subdomains: []
        certificate:
          enabled: true
          wildcard: false
          issuer:
            kind: ""
            name: ""
        dnsEndpoints:
          enabled: true
          annotations:
            giantswarm.io/external-dns: managed
        port: 443
        allowedRoutes:
          namespaces:
            from: All
        tls:
          mode: Terminate
          certificateRefs: []
    # ClientTrafficPolicy configures Envoy Gateway client traffic settings.
    # When omitted, the policy is created automatically for CAPA gateways using
    # an AWS NLB (with PROXY protocol and /healthz health check defaults).
    # Set enabled: true to create the policy regardless of provider, or
    # enabled: false to suppress creation even on CAPA+NLB.
    # All other keys are passed directly to the ClientTrafficPolicy spec and
    # override provider defaults. Available fields (see kubectl explain clienttrafficpolicy.spec):
    clientTrafficPolicy: {}
    # Per-gateway error pages override gatewayClass errorPages settings.
    # Omit fields to inherit from gatewayClass config.
    errorPages: {}
    # BackendTrafficPolicy configures Envoy Gateway backend traffic settings for
    # this gateway. When omitted, a policy is created only if error pages are
    # enabled (see errorPages). Any keys set here are passed directly to the
    # BackendTrafficPolicy spec and are merged into the same policy as the error
    # pages responseOverride (Envoy Gateway allows only one policy per Gateway).
    # Set enabled: false to suppress the policy even when error pages are enabled.
    # Available fields (see kubectl explain backendtrafficpolicy.spec): circuitBreaker,
    # rateLimit, retry, loadBalancer, healthCheck, timeout, ...
    # Example:
    #   backendTrafficPolicy:
    #     circuitBreaker:
    #       maxConnections: 1024
    #       maxPendingRequests: 1024
    #       maxParallelRequests: 1024
    backendTrafficPolicy: {}
    envoyProxy:
      enabled: true
      # Controls how this gateway-level EnvoyProxy merges onto the GatewayClass-level one
      # (hierarchy: EnvoyGateway defaults < GatewayClass < Gateway). StrategicMerge lets the
      # gateway inherit GatewayClass base defaults (HPA, PDB, image) and only override deltas.
      # A gateway referencing a className not managed by this chart will not inherit those
      # base defaults. Defaults to StrategicMerge when left empty.
      mergeType: StrategicMerge
      envoyDeployment: {}
      envoyService: {}
      envoyHpa: {}
      envoyPDB: {}
      envoyServiceAccount: {}
