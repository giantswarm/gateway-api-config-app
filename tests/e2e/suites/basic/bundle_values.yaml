apps:
  gatewayApiConfig:
    userConfig:
      configMap:
        values:
          errorPages:
            enabled: true
            statusCodes:
              - type: Value
                value: 500
              - type: Value
                value: 502
              - type: Range
                range:
                  start: 503
                  end: 504
            contentType: "text/html"
            body: "<html><body><h1>Giant Swarm - Service Unavailable</h1></body></html>"
          gateways:
            default:
              dnsName: ingress
              listeners:
                http:
                  httpsRedirectEnabled: true
                  allowedRoutes:
                    namespaces:
                      from: Same
                https:
                  dnsEndpoints:
                    enabled: false
                  certificate:
                    enabled: true
                    wildcard: true
                    issuer:
                      kind: ClusterIssuer
                      name: letsencrypt-giantswarm
